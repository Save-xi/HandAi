name: single-hand-teleop-baseline CI

"on":
  push:
    paths:
      - "single-hand-teleop-baseline/**"
      - ".github/workflows/single-hand-teleop-baseline-ci.yml"
      - "LICENSE"
  pull_request:
    paths:
      - "single-hand-teleop-baseline/**"
      - ".github/workflows/single-hand-teleop-baseline-ci.yml"
      - "LICENSE"

jobs:
  baseline-ci:
    name: baseline checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    defaults:
      run:
        working-directory: single-hand-teleop-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            single-hand-teleop-baseline/requirements.txt
            single-hand-teleop-baseline/pyproject.toml

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install required CI tooling
        run: |
          python -m pip install ruff

      - name: Install pip-audit (advisory)
        continue-on-error: true
        run: |
          python -m pip install pip-audit

      - name: Check installed dependencies
        run: |
          python -m pip check

      - name: Ruff check
        run: |
          python -m ruff check src tests

      - name: Compile sources
        run: |
          python -m compileall -q src

      - name: Run tests
        shell: bash
        run: |
          mkdir -p ../ci-artifacts
          set -o pipefail
          pytest -q 2>&1 | tee ../ci-artifacts/pytest.log

      - name: Upload CI diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: single-hand-teleop-baseline-diagnostics-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            ci-artifacts/**
            single-hand-teleop-baseline/outputs/**
            single-hand-teleop-baseline/examples/*.json
            single-hand-teleop-baseline/examples/*.jsonl

      - name: pip-audit (advisory)
        continue-on-error: true
        run: |
          python -m pip_audit -r requirements.txt
