name: 单右手 baseline CI

"on":
  push:
    paths:
      - "single-hand-teleop-baseline/**"
      - ".github/workflows/single-hand-teleop-baseline-ci.yml"
      - "LICENSE"
  pull_request:
    paths:
      - "single-hand-teleop-baseline/**"
      - ".github/workflows/single-hand-teleop-baseline-ci.yml"
      - "LICENSE"

jobs:
  baseline-ci:
    name: baseline 检查 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    defaults:
      run:
        working-directory: single-hand-teleop-baseline
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            single-hand-teleop-baseline/requirements.txt
            single-hand-teleop-baseline/pyproject.toml

      - name: 安装运行与测试依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 安装 CI 必需工具
        run: |
          python -m pip install ruff

      - name: 安装 pip-audit（仅告警）
        continue-on-error: true
        run: |
          python -m pip install pip-audit

      - name: 检查已安装依赖
        run: |
          python -m pip check

      - name: 运行 Ruff 检查
        run: |
          python -m ruff check src tests

      - name: 编译源码
        run: |
          python -m compileall -q src

      - name: 运行测试
        shell: bash
        run: |
          mkdir -p ../ci-artifacts
          set -o pipefail
          pytest -q 2>&1 | tee ../ci-artifacts/pytest.log

      - name: 失败时上传诊断信息
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: single-hand-baseline-diagnostics-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            ci-artifacts/**
            single-hand-teleop-baseline/outputs/**
            single-hand-teleop-baseline/examples/*.json
            single-hand-teleop-baseline/examples/*.jsonl

      - name: 运行 pip-audit（仅告警）
        continue-on-error: true
        run: |
          python -m pip_audit -r requirements.txt
