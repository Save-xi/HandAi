# 默认启动路径：
# 单右手视觉 baseline、webcam/video 输入、冻结的 payload 导出，
# 默认关闭 control / SVH 扩展。
camera_index: 0
input_source_type: webcam  # webcam | video_file；Unity 和真实硬件都不是 baseline 输入前提
video_file_path: ""
input_mirrored: false  # 只有当输入流本身已经是镜像/自拍视角时才设为 true
gui_enabled: true
headless: false
display_width: 1280
display_height: 720
draw_landmarks: true
console_print_every_n_frames: 5
console_landmarks_preview_count: 3
save_last_json: true
save_jsonl: false
jsonl_output_dir: "outputs"
output_json_path: "examples/sample_output.json"
export_last_every_n_frames: 5  # 运行期按帧间隔节流写 last-frame JSON，正常退出时仍会补写一次
jsonl_flush_interval: 10  # JSONL 保持一个小缓冲，降低实时运行时的逐帧写盘压力
recent_frames_buffer_size: 10
enable_control_extension: false  # 默认单右手 baseline 保持关闭；只有需要可选控制层时才开启
control_grasp_open_ref: 0.02
control_grasp_closed_ref: 0.55
control_pinch_open_ref: 0.45
control_pinch_closed_ref: 0.08
control_hand_open_ratio_open_ref: 0.95
control_hand_open_ratio_closed_ref: 0.25
control_pinch_index_open_ref: 0.05
control_pinch_index_closed_ref: 0.35
svh_enable_preview: false  # 默认关闭 preview 扩展，让 baseline 能独立于 Unity / SVH 下游工作运行
svh_enable_gesture_fallback: false  # 这是偏演示用途的 fallback；默认关闭会更保守
svh_preview_layout: "compact5"  # compact5 是当前轻量 preview；切到 svh_9ch 更接近论文/C# 参考顺序
svh_preview_channel_count: 5  # 如果想使用更像 SVH 的 preview 向量，可配合 svh_9ch 一起改成 9
svh_preview_mode: "preview"
svh_transport: "mock"  # 未来可以扩展 TCP transport，但不需要改适配器调用点
svh_protocol_sync_bytes: [76, 170]  # 论文启发的 preview sync bytes（0x4C, 0xAA），不代表完整协议已确认
svh_grasp_open_ref: 0.02  # 非拇指平均 curl 接近张开手时的参考值
svh_grasp_closed_ref: 0.55  # 非拇指平均 curl 接近闭合抓握时的参考值
svh_pinch_open_ref: 0.45  # 捏合距离较大，表示拇指与食指分开
svh_pinch_closed_ref: 0.08  # 捏合距离较小，表示捏合更强
svh_invalid_holds_last_command: false
svh_protocol_use_little_endian: true
svh_hand_open_ratio_open_ref: 0.95
svh_hand_open_ratio_closed_ref: 0.25
svh_position_open_value: 0.0
svh_position_closed_value: 1.0
svh_thumb_grasp_scale: 0.85
svh_thumb_opposition_scale: 0.75
svh_pinch_support_scale: 0.20
svh_open_spread_scale: 0.25
svh_grasp_spread_scale: 0.05
svh_pinch_spread_scale: 0.10
svh_pinch_index_open_ref: 0.05
svh_pinch_index_closed_ref: 0.35
control_ready_min_in_bounds_ratio: 0.90  # 要求大多数 landmark 保持在画面内
control_ready_palm_center_margin: 0.08  # 当掌心中心贴边时拒绝控制更新
control_ready_palm_core_oob_tolerance: 0.02  # 允许 MediaPipe 的掌心关键点有一点点越界
pinch_distance_norm_threshold: 0.45
pinch_open_ratio_min: 0.75
pinch_support_curl_max: 0.65
open_ratio_threshold: 0.85
open_mean_curl_max: 0.45
fist_ratio_threshold: 0.85
fist_mean_curl_min: 0.45
fist_compact_ratio_threshold: 0.65
stable_gesture_window: 5
stable_gesture_min_consecutive: 2
stable_unknown_consecutive: 1
min_detection_confidence: 0.5
min_tracking_confidence: 0.5
max_num_hands: 2  # 检测器可以看到多只手，但 baseline 输出仍只选择单右手
